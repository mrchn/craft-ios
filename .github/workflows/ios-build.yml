name: Build unsigned app for iOS (for Altstore install)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies (Node.js)
        run: npm ci

      - name: Generate native iOS project (expo-prebuild)
        run: npx expo prebuild --platform ios

      - name: Build unsigned .ipa using xcodebuild
        run: |
          cd ios

          xcodebuild archive \
            -workspace *.xcworkspace \
            -scheme $(basename *.xcodeproj .xcodeproj) \
            -configuration Release \
            -archivePath build/pdfcraft-mobile.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p build/Payload
          cp -r build/pdfcraft-mobile.xcarchive/Products/Applications/*.app build/Payload/

          cd build
          zip -r pdfcraft-mobile.ipa Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdfcraft-mobile
          path: ios/build/pdfcraft-mobile.ipa
          retention-days: 14