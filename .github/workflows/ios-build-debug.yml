name: Build unsigned app for iOS (Debug)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  Build-unsigned-ipa-debug:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies (Yarn)
        run: yarn install --frozen-lockfile

      - name: Setup CocoaPods
        uses: step-security/setup-cocoapods@v1
        with:
          version: latest

      - name: Generate native iOS project (expo-prebuild)
        run: |
          jq '.expo.ios.buildNumber = "'"${{ github.run_number }}"'"' app.json > temp.json && mv temp.json app.json
          npx expo prebuild --platform ios --clean

      - name: Build unsigned .ipa using xcodebuild
        run: |
          cd ios

          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -n 1)
          SCHEME=$(basename "$PROJECT" .xcodeproj)

          if [ -n "$WORKSPACE" ]; then
            xcodebuild archive \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration Debug \
              -archivePath build/pdfcraft-mobile.xcarchive \
              -destination generic/platform=iOS \
              -parallelizeTargets \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              COMPILER_INDEX_STORE_ENABLED=NO \
              SWIFT_WHOLE_MODULE_OPTIMIZATION=NO \
              MTL_ENABLE_DEBUG_INFO=YES \
              DEBUG_INFORMATION_FORMAT=dwarf
          else
            xcodebuild archive \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -configuration Debug \
              -archivePath build/pdfcraft-mobile.xcarchive \
              -destination generic/platform=iOS \
              -parallelizeTargets \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              COMPILER_INDEX_STORE_ENABLED=NO \
              SWIFT_WHOLE_MODULE_OPTIMIZATION=NO \
              MTL_ENABLE_DEBUG_INFO=YES \
              DEBUG_INFORMATION_FORMAT=dwarf
          fi

          cd build/pdfcraft-mobile.xcarchive/Products/Applications/
          mkdir Payload
          cp -R *.app Payload/
          zip -r ../../../../craft-debug.ipa Payload
          cd $GITHUB_WORKSPACE

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: craft-ios-${{ github.run_number }}-debug
          path: ios/craft-debug.ipa
          retention-days: 7